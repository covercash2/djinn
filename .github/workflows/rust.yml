name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install nightly toolchain
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy
    - name: typos
      uses: crate-ci/typos@v1.27.3
    - name: clippy
      run: cargo clippy -- -D warnings
    - name: test
      run: cargo test --all
